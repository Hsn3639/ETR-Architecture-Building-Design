<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Coastal villa facade study">
  <rect width="800" height="600" fill="#e8e3d9"/>
  <rect x="0" y="430" width="800" height="170" fill="#dcd5c7"/>
  <g fill="#1b1a18">
    <rect x="120" y="150" width="430" height="300"/>
  </g>
  <!-- horizontal louvers -->
  <g stroke="#f5f3ee" stroke-width="6">
    <line x1="120" y1="190" x2="550" y2="190"/><line x1="120" y1="230" x2="550" y2="230"/>
    <line x1="120" y1="270" x2="550" y2="270"/><line x1="120" y1="310" x2="550" y2="310"/>
    <line x1="120" y1="350" x2="550" y2="350"/><line x1="120" y1="390" x2="550" y2="390"/>
  </g>
  <rect x="560" y="150" width="120" height="300" fill="#b29a78" fill-opacity="0.55"/>
  <rect x="560" y="150" width="120" height="300" fill="none" stroke="#93794f" stroke-width="2"/>
</svg>
