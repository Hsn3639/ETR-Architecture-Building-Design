<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract architectural facade at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262420"/>
      <stop offset="1" stop-color="#15140f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9B27E" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#C9B27E" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- faint blueprint grid -->
  <g stroke="#ffffff" stroke-opacity="0.05">
    <g>
      <line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="300" x2="1600" y2="300"/>
      <line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="600" x2="1600" y2="600"/>
      <line x1="0" y1="750" x2="1600" y2="750"/>
    </g>
    <g>
      <line x1="200" y1="0" x2="200" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
      <line x1="600" y1="0" x2="600" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
      <line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/>
      <line x1="1400" y1="0" x2="1400" y2="900"/>
    </g>
  </g>

  <!-- building massing silhouettes -->
  <g fill="#0f0e0b" fill-opacity="0.9">
    <rect x="120" y="430" width="240" height="470"/>
    <rect x="1180" y="360" width="300" height="540"/>
  </g>
  <g fill="#1d1b16">
    <rect x="430" y="300" width="360" height="600"/>
    <rect x="820" y="220" width="320" height="680"/>
  </g>

  <!-- lit windows (sand) -->
  <g fill="#C9B27E" fill-opacity="0.85">
    <rect x="470" y="340" width="28" height="48"/><rect x="520" y="340" width="28" height="48"/>
    <rect x="470" y="420" width="28" height="48"/><rect x="620" y="500" width="28" height="48"/>
    <rect x="860" y="280" width="26" height="44"/><rect x="910" y="360" width="26" height="44"/>
    <rect x="1010" y="280" width="26" height="44"/><rect x="1240" y="420" width="30" height="52"/>
    <rect x="1300" y="500" width="30" height="52"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.10">
    <rect x="430" y="300" width="360" height="3"/><rect x="820" y="220" width="320" height="3"/>
  </g>
</svg>
