<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ETR Architectural Consultants emblem">
  <defs>
    <linearGradient id="etrGoldH" x1="30" y1="18" x2="72" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0d99a"/>
      <stop offset=".5" stop-color="#d6ab53"/>
      <stop offset="1" stop-color="#b5882f"/>
    </linearGradient>
  </defs>
  <!-- "e" ring, open to the right (light, for dark hero) -->
  <path d="M66 30 A30 30 0 1 0 66 74" fill="none" stroke="#f3efe6" stroke-width="9" stroke-linecap="round"/>
  <!-- "e" bar -->
  <line x1="40" y1="52" x2="67" y2="52" stroke="#f3efe6" stroke-width="9" stroke-linecap="round"/>
  <!-- drafting compass legs -->
  <line x1="52" y1="25" x2="34" y2="86" stroke="url(#etrGoldH)" stroke-width="5.4" stroke-linecap="round"/>
  <line x1="52" y1="25" x2="68" y2="86" stroke="url(#etrGoldH)" stroke-width="5.4" stroke-linecap="round"/>
  <!-- compass hinge -->
  <circle cx="52" cy="24" r="4.6" fill="url(#etrGoldH)"/>
  <!-- bright centre pivot -->
  <circle cx="49" cy="52" r="3.4" fill="#f4e3ad"/>
</svg>
