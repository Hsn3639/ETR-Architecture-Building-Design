<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural concept board — sketch elevation transitioning into a shaded render of a terraced cantilevered building">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe7d6"/><stop offset="1" stop-color="#e4d6bd"/>
    </linearGradient>
    <linearGradient id="glassF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0cd8b"/><stop offset="1" stop-color="#cf8f3b"/>
    </linearGradient>
    <linearGradient id="glassS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9772e"/><stop offset="1" stop-color="#8f5620"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#f6cd76" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f6cd76" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>

  <!-- faint blueprint grid -->
  <g stroke="#2a2622" stroke-opacity="0.05">
    <line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- warm interior glow behind the render -->
  <ellipse cx="1120" cy="470" rx="430" ry="360" fill="url(#glow)"/>

  <!-- ===================== ANNOTATIONS ===================== -->
  <!-- sun-path / shading study -->
  <g stroke="#b4602a" stroke-opacity="0.5" fill="none">
    <circle cx="250" cy="150" r="24" fill="#c98a3c" fill-opacity="0.5" stroke="none"/>
    <path d="M205 215 A 240 240 0 0 1 410 120" stroke-dasharray="5 7"/>
    <g stroke-width="1.4">
      <path d="M280 175 L430 300 M315 150 L480 285"/>
      <path d="M422 294 l16 -2 l-7 14 Z" fill="#b4602a" fill-opacity="0.5" stroke="none"/>
      <path d="M472 279 l16 -2 l-7 14 Z" fill="#b4602a" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
  <g stroke="#2a2622" stroke-opacity="0.42" stroke-width="1.2" fill="none">
    <line x1="860" y1="110" x2="1360" y2="110"/><path d="M860 102 V118 M1360 102 V118 M1110 102 V118"/>
    <line x1="700" y1="280" x2="700" y2="740"/><path d="M692 280 H708 M692 740 H708 M692 510 H708"/>
    <line x1="1380" y1="320" x2="1500" y2="320" stroke-dasharray="6 6"/><circle cx="1506" cy="320" r="5"/>
    <line x1="1380" y1="560" x2="1500" y2="560" stroke-dasharray="6 6"/><circle cx="1506" cy="560" r="5"/>
    <!-- section marker -->
    <line x1="820" y1="810" x2="1320" y2="810"/><path d="M820 800 v20 M1320 800 v20"/><circle cx="820" cy="810" r="12"/><circle cx="1320" cy="810" r="12"/>
    <!-- note blocks -->
    <g stroke-opacity="0.3"><line x1="120" y1="640" x2="262" y2="640"/><line x1="120" y1="660" x2="240" y2="660"/><line x1="120" y1="680" x2="272" y2="680"/><line x1="120" y1="700" x2="208" y2="700"/></g>
    <!-- detail callout -->
    <circle cx="1470" cy="700" r="40" stroke-opacity="0.5"/>
    <g stroke-opacity="0.5"><line x1="1450" y1="676" x2="1450" y2="724"/><line x1="1470" y1="676" x2="1470" y2="724"/><line x1="1490" y1="676" x2="1490" y2="724"/></g>
    <!-- compass -->
    <circle cx="150" cy="770" r="30" stroke-opacity="0.4"/><path d="M150 744 L159 770 L150 796 L141 770 Z" fill="#b4602a" fill-opacity="0.55" stroke="none"/>
  </g>
  <!-- scale bar -->
  <g transform="translate(250,792)">
    <rect x="0" y="0" width="38" height="9" fill="#2a2622" fill-opacity="0.6"/><rect x="38" y="0" width="38" height="9" fill="none" stroke="#2a2622" stroke-opacity="0.5"/><rect x="76" y="0" width="38" height="9" fill="#2a2622" fill-opacity="0.6"/><rect x="114" y="0" width="38" height="9" fill="none" stroke="#2a2622" stroke-opacity="0.5"/>
  </g>

  <!-- ground + soft shadow -->
  <line x1="120" y1="760" x2="1500" y2="760" stroke="#2a2622" stroke-opacity="0.5" stroke-width="1.5"/>
  <ellipse cx="1110" cy="766" rx="320" ry="20" fill="#2a2622" fill-opacity="0.12"/>

  <!-- ===================== LEFT: SKETCH ELEVATION ===================== -->
  <g stroke="#2a2622" stroke-opacity="0.55" stroke-width="1.4" fill="none">
    <rect x="430" y="320" width="190" height="440"/>
    <line x1="430" y1="408" x2="620" y2="408"/><line x1="430" y1="496" x2="620" y2="496"/><line x1="430" y1="584" x2="620" y2="584"/><line x1="430" y1="672" x2="620" y2="672"/>
    <g stroke-opacity="0.35"><line x1="478" y1="320" x2="478" y2="760"/><line x1="525" y1="320" x2="525" y2="760"/><line x1="572" y1="320" x2="572" y2="760"/></g>
    <path d="M430 320 L525 286 L620 320"/>
    <rect x="505" y="700" width="40" height="60"/>
    <!-- sketched tree (line only) -->
    <line x1="360" y1="760" x2="360" y2="640"/><circle cx="360" cy="610" r="40"/><circle cx="335" cy="630" r="24"/><circle cx="388" cy="628" r="22"/>
  </g>
  <!-- transition seam -->
  <line x1="720" y1="280" x2="720" y2="760" stroke="#2a2622" stroke-opacity="0.3" stroke-width="1.4" stroke-dasharray="3 8"/>

  <!-- ===================== RIGHT: SHADED RENDER ===================== -->
  <!-- core -->
  <rect x="1066" y="250" width="30" height="510" fill="#2a2622" fill-opacity="0.85"/>
  <!-- helper: each level has front (glassF), top (wood) and side (glassS) faces for axon depth -->
  <!-- L1 -->
  <g>
    <polygon points="900,672 946,646 1326,646 1280,672" fill="#cf9a52"/>
    <polygon points="1280,672 1326,646 1326,738 1280,764" fill="url(#glassS)"/>
    <rect x="900" y="672" width="380" height="92" fill="url(#glassF)" stroke="#2a2622" stroke-width="1.5"/>
    <g stroke="#2a2622" stroke-opacity="0.32"><line x1="970" y1="672" x2="970" y2="764"/><line x1="1090" y1="672" x2="1090" y2="764"/><line x1="1210" y1="672" x2="1210" y2="764"/></g>
    <line x1="900" y1="764" x2="1280" y2="764" stroke="#2a2622" stroke-opacity="0.4"/>
  </g>
  <!-- L2 cantilever left -->
  <g>
    <polygon points="840,576 886,550 1266,550 1220,576" fill="#cf9a52"/>
    <polygon points="1220,576 1266,550 1266,636 1220,662" fill="url(#glassS)"/>
    <rect x="840" y="576" width="380" height="86" fill="url(#glassF)" stroke="#2a2622" stroke-width="1.5"/>
    <g stroke="#2a2622" stroke-opacity="0.32"><line x1="910" y1="576" x2="910" y2="662"/><line x1="1030" y1="576" x2="1030" y2="662"/><line x1="1150" y1="576" x2="1150" y2="662"/></g>
    <!-- terrace greenery on L1 roof edge -->
    <g fill="#6f7d4a" fill-opacity="0.8"><circle cx="1240" cy="648" r="13"/><circle cx="1272" cy="644" r="11"/><circle cx="1300" cy="648" r="10"/></g>
  </g>
  <!-- L3 cantilever right -->
  <g>
    <polygon points="980,480 1026,454 1406,454 1360,480" fill="#cf9a52"/>
    <polygon points="1360,480 1406,454 1406,540 1360,566" fill="url(#glassS)"/>
    <rect x="980" y="480" width="380" height="86" fill="url(#glassF)" stroke="#2a2622" stroke-width="1.5"/>
    <g stroke="#2a2622" stroke-opacity="0.32"><line x1="1050" y1="480" x2="1050" y2="566"/><line x1="1170" y1="480" x2="1170" y2="566"/><line x1="1290" y1="480" x2="1290" y2="566"/></g>
    <g fill="#6f7d4a" fill-opacity="0.8"><circle cx="846" cy="552" r="12"/><circle cx="876" cy="548" r="11"/></g>
  </g>
  <!-- L4 cantilever left -->
  <g>
    <polygon points="900,384 946,358 1286,358 1240,384" fill="#cf9a52"/>
    <polygon points="1240,384 1286,358 1286,442 1240,468" fill="url(#glassS)"/>
    <rect x="900" y="384" width="340" height="84" fill="url(#glassF)" stroke="#2a2622" stroke-width="1.5"/>
    <g stroke="#2a2622" stroke-opacity="0.32"><line x1="970" y1="384" x2="970" y2="468"/><line x1="1090" y1="384" x2="1090" y2="468"/><line x1="1180" y1="384" x2="1180" y2="468"/></g>
    <g fill="#6f7d4a" fill-opacity="0.8"><circle cx="1366" cy="456" r="12"/><circle cx="1394" cy="452" r="10"/></g>
  </g>
  <!-- L5 roof + garden -->
  <g>
    <polygon points="960,292 1006,266 1306,266 1260,292" fill="#b4602a"/>
    <polygon points="1260,292 1306,266 1306,350 1260,376" fill="url(#glassS)"/>
    <rect x="960" y="292" width="300" height="84" fill="url(#glassF)" stroke="#2a2622" stroke-width="1.5"/>
    <g stroke="#2a2622" stroke-opacity="0.32"><line x1="1030" y1="292" x2="1030" y2="376"/><line x1="1140" y1="292" x2="1140" y2="376"/><line x1="1200" y1="292" x2="1200" y2="376"/></g>
    <g fill="#6f7d4a" fill-opacity="0.85"><circle cx="1010" cy="262" r="13"/><circle cx="1045" cy="258" r="15"/><circle cx="1085" cy="262" r="12"/><circle cx="1120" cy="260" r="11"/></g>
  </g>

  <!-- pilotis + entry + figures for scale -->
  <g stroke="#2a2622" stroke-opacity="0.8" stroke-width="6"><line x1="930" y1="760" x2="930" y2="700"/><line x1="1100" y1="760" x2="1100" y2="700"/><line x1="1250" y1="760" x2="1250" y2="700"/></g>
  <path d="M820 760 L905 706 L905 718 L840 760 Z" fill="#2a2622" fill-opacity="0.22"/>
  <g fill="#2a2622" fill-opacity="0.65">
    <circle cx="876" cy="730" r="6"/><rect x="872" y="736" width="8" height="22" rx="3"/>
    <circle cx="1340" cy="742" r="5"/><rect x="1337" y="747" width="7" height="15" rx="3"/>
  </g>

  <!-- foreground autumn tree (render side) -->
  <g>
    <line x1="640" y1="760" x2="640" y2="600" stroke="#3a322a" stroke-width="7"/>
    <g fill="#c46a2a"><circle cx="620" cy="580" r="44"/><circle cx="672" cy="592" r="38"/><circle cx="646" cy="548" r="40"/></g>
    <g fill="#d98a3f" fill-opacity="0.85"><circle cx="602" cy="598" r="24"/><circle cx="686" cy="566" r="22"/><circle cx="652" cy="580" r="28"/></g>
    <g fill="#b4602a" fill-opacity="0.7"><circle cx="635" cy="600" r="16"/><circle cx="664" cy="544" r="14"/></g>
  </g>
</svg>
