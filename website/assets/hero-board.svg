<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural concept board — cantilevered building with pencil annotations">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe7d6"/><stop offset="1" stop-color="#e4d6bd"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c97e"/><stop offset="1" stop-color="#d79a45"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>

  <!-- faint blueprint grid -->
  <g stroke="#2a2622" stroke-opacity="0.05">
    <line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- pencil annotations -->
  <g stroke="#2a2622" stroke-opacity="0.42" stroke-width="1.2" fill="none">
    <!-- top dimension line -->
    <line x1="900" y1="120" x2="1320" y2="120"/>
    <path d="M900 112 V128 M1320 112 V128 M1110 112 V128"/>
    <!-- leader to building -->
    <line x1="1340" y1="300" x2="1470" y2="300" stroke-dasharray="6 6"/>
    <circle cx="1474" cy="300" r="5"/>
    <line x1="1340" y1="500" x2="1470" y2="500" stroke-dasharray="6 6"/>
    <circle cx="1474" cy="500" r="5"/>
    <!-- side vertical dimension -->
    <line x1="720" y1="300" x2="720" y2="720"/>
    <path d="M712 300 H728 M712 720 H728 M712 510 H728"/>
    <!-- handwriting note blocks -->
    <g stroke-opacity="0.3">
      <line x1="120" y1="640" x2="260" y2="640"/><line x1="120" y1="660" x2="240" y2="660"/>
      <line x1="120" y1="680" x2="270" y2="680"/><line x1="120" y1="700" x2="210" y2="700"/>
    </g>
    <!-- compass -->
    <circle cx="1420" cy="730" r="34" stroke-opacity="0.4"/>
    <path d="M1420 700 L1430 730 L1420 760 L1410 730 Z" fill="#b4602a" fill-opacity="0.5" stroke="none"/>
  </g>

  <!-- construction guide lines rising from building -->
  <g stroke="#2a2622" stroke-opacity="0.18" stroke-width="1">
    <line x1="840" y1="80" x2="840" y2="760"/><line x1="1240" y1="80" x2="1240" y2="760"/>
  </g>

  <!-- autumn tree -->
  <g>
    <line x1="540" y1="760" x2="540" y2="560" stroke="#3a322a" stroke-width="6"/>
    <path d="M540 620 L500 580 M540 600 L585 560" stroke="#3a322a" stroke-width="4" fill="none"/>
    <g fill="#c46a2a"><circle cx="520" cy="540" r="46"/><circle cx="575" cy="555" r="40"/><circle cx="545" cy="505" r="42"/></g>
    <g fill="#d98a3f" fill-opacity="0.85"><circle cx="500" cy="560" r="26"/><circle cx="590" cy="525" r="24"/><circle cx="552" cy="540" r="30"/></g>
    <g fill="#b4602a" fill-opacity="0.7"><circle cx="535" cy="565" r="18"/><circle cx="565" cy="500" r="16"/></g>
  </g>

  <!-- ground line -->
  <line x1="120" y1="760" x2="1480" y2="760" stroke="#2a2622" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- cantilevered building: exploded floor slabs (wood + amber glass) -->
  <!-- vertical core -->
  <rect x="1040" y="250" width="34" height="510" fill="#2a2622" fill-opacity="0.9"/>
  <!-- slabs from bottom up, alternating cantilever -->
  <g>
    <!-- L1 -->
    <g>
      <rect x="900" y="660" width="360" height="92" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
      <rect x="900" y="652" width="360" height="10" fill="#c98a3c"/>
      <g stroke="#2a2622" stroke-opacity="0.35"><line x1="960" y1="660" x2="960" y2="752"/><line x1="1020" y1="660" x2="1020" y2="752"/><line x1="1140" y1="660" x2="1140" y2="752"/><line x1="1200" y1="660" x2="1200" y2="752"/></g>
    </g>
    <!-- L2 -->
    <g>
      <rect x="960" y="560" width="360" height="88" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
      <rect x="960" y="552" width="360" height="10" fill="#c98a3c"/>
      <g stroke="#2a2622" stroke-opacity="0.35"><line x1="1020" y1="560" x2="1020" y2="648"/><line x1="1140" y1="560" x2="1140" y2="648"/><line x1="1260" y1="560" x2="1260" y2="648"/></g>
    </g>
    <!-- L3 -->
    <g>
      <rect x="880" y="460" width="360" height="88" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
      <rect x="880" y="452" width="360" height="10" fill="#c98a3c"/>
      <g stroke="#2a2622" stroke-opacity="0.35"><line x1="940" y1="460" x2="940" y2="548"/><line x1="1060" y1="460" x2="1060" y2="548"/><line x1="1180" y1="460" x2="1180" y2="548"/></g>
    </g>
    <!-- L4 -->
    <g>
      <rect x="960" y="360" width="340" height="88" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
      <rect x="960" y="352" width="340" height="10" fill="#c98a3c"/>
      <g stroke="#2a2622" stroke-opacity="0.35"><line x1="1030" y1="360" x2="1030" y2="448"/><line x1="1150" y1="360" x2="1150" y2="448"/><line x1="1230" y1="360" x2="1230" y2="448"/></g>
    </g>
    <!-- L5 roof -->
    <g>
      <rect x="900" y="262" width="320" height="86" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
      <rect x="900" y="252" width="320" height="12" fill="#b4602a"/>
      <g stroke="#2a2622" stroke-opacity="0.35"><line x1="970" y1="262" x2="970" y2="348"/><line x1="1080" y1="262" x2="1080" y2="348"/><line x1="1160" y1="262" x2="1160" y2="348"/></g>
    </g>
  </g>
</svg>
