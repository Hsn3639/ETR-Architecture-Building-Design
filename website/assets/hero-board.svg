<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural concept board — sectioned cantilevered building with pencil annotations, sun study and scale bar">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe7d6"/><stop offset="1" stop-color="#e4d6bd"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eec888"/><stop offset="1" stop-color="#d2933f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0" stop-color="#f4c873" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4c873" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>

  <!-- faint blueprint grid -->
  <g stroke="#2a2622" stroke-opacity="0.05">
    <line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- warm interior glow behind the building -->
  <ellipse cx="1080" cy="500" rx="380" ry="320" fill="url(#glow)"/>

  <!-- sun-path / shading study (climate-responsive nod) -->
  <g stroke="#b4602a" stroke-opacity="0.5" fill="none">
    <circle cx="300" cy="180" r="26" fill="#c98a3c" fill-opacity="0.5" stroke="none"/>
    <path d="M250 250 A 260 260 0 0 1 470 150" stroke-dasharray="5 7"/>
    <g stroke-width="1.4">
      <path d="M330 205 L470 320 M360 175 L520 300 M395 160 L560 290"/>
      <path d="M462 314 l16 -2 l-7 14 Z" fill="#b4602a" fill-opacity="0.5" stroke="none"/>
      <path d="M512 295 l16 -2 l-7 14 Z" fill="#b4602a" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>

  <!-- pencil annotations -->
  <g stroke="#2a2622" stroke-opacity="0.42" stroke-width="1.2" fill="none">
    <!-- top dimension string -->
    <line x1="880" y1="120" x2="1320" y2="120"/>
    <path d="M880 112 V128 M1320 112 V128 M1100 112 V128"/>
    <!-- secondary dimension string -->
    <line x1="880" y1="150" x2="1100" y2="150"/>
    <path d="M880 144 V156 M1100 144 V156 M990 144 V156"/>
    <!-- side vertical dimension -->
    <line x1="700" y1="300" x2="700" y2="730"/>
    <path d="M692 300 H708 M692 730 H708 M692 515 H708"/>
    <!-- leader lines + nodes -->
    <line x1="1340" y1="320" x2="1480" y2="320" stroke-dasharray="6 6"/><circle cx="1486" cy="320" r="5"/>
    <line x1="1340" y1="540" x2="1480" y2="540" stroke-dasharray="6 6"/><circle cx="1486" cy="540" r="5"/>
    <!-- section marker A—A -->
    <line x1="820" y1="800" x2="1300" y2="800"/>
    <path d="M820 790 l0 20 M1300 790 l0 20"/>
    <circle cx="820" cy="800" r="12"/><circle cx="1300" cy="800" r="12"/>
    <!-- handwriting note blocks -->
    <g stroke-opacity="0.3">
      <line x1="120" y1="620" x2="262" y2="620"/><line x1="120" y1="640" x2="240" y2="640"/>
      <line x1="120" y1="660" x2="272" y2="660"/><line x1="120" y1="680" x2="208" y2="680"/>
      <line x1="120" y1="710" x2="250" y2="710"/><line x1="120" y1="730" x2="226" y2="730"/>
    </g>
    <!-- detail callout (zoomed mullion) -->
    <circle cx="640" cy="430" r="62" stroke-opacity="0.5"/>
    <line x1="690" y1="470" x2="900" y2="560" stroke-dasharray="5 6" stroke-opacity="0.4"/>
    <g stroke-opacity="0.5"><line x1="612" y1="398" x2="612" y2="462"/><line x1="640" y1="398" x2="640" y2="462"/><line x1="668" y1="398" x2="668" y2="462"/><line x1="600" y1="430" x2="680" y2="430"/></g>
    <!-- compass -->
    <circle cx="1430" cy="730" r="34" stroke-opacity="0.4"/>
    <path d="M1430 700 L1440 730 L1430 760 L1420 730 Z" fill="#b4602a" fill-opacity="0.55" stroke="none"/>
  </g>

  <!-- scale bar -->
  <g transform="translate(120,790)">
    <rect x="0" y="0" width="40" height="10" fill="#2a2622" fill-opacity="0.6"/>
    <rect x="40" y="0" width="40" height="10" fill="none" stroke="#2a2622" stroke-opacity="0.5"/>
    <rect x="80" y="0" width="40" height="10" fill="#2a2622" fill-opacity="0.6"/>
    <rect x="120" y="0" width="40" height="10" fill="none" stroke="#2a2622" stroke-opacity="0.5"/>
  </g>

  <!-- construction guide lines rising from building -->
  <g stroke="#2a2622" stroke-opacity="0.16" stroke-width="1">
    <line x1="840" y1="80" x2="840" y2="770"/><line x1="1240" y1="80" x2="1240" y2="770"/>
  </g>

  <!-- autumn tree -->
  <g>
    <line x1="540" y1="770" x2="540" y2="560" stroke="#3a322a" stroke-width="6"/>
    <path d="M540 620 L500 580 M540 600 L585 560" stroke="#3a322a" stroke-width="4" fill="none"/>
    <g fill="#c46a2a"><circle cx="520" cy="540" r="46"/><circle cx="575" cy="555" r="40"/><circle cx="545" cy="505" r="42"/></g>
    <g fill="#d98a3f" fill-opacity="0.85"><circle cx="500" cy="560" r="26"/><circle cx="590" cy="525" r="24"/><circle cx="552" cy="540" r="30"/></g>
    <g fill="#b4602a" fill-opacity="0.7"><circle cx="535" cy="565" r="18"/><circle cx="565" cy="500" r="16"/></g>
  </g>

  <!-- ground line + plinth -->
  <line x1="120" y1="770" x2="1490" y2="770" stroke="#2a2622" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="900" y="770" width="380" height="14" fill="#2a2622" fill-opacity="0.18"/>

  <!-- pilotis (columns lifting ground floor) -->
  <g stroke="#2a2622" stroke-opacity="0.8" stroke-width="6">
    <line x1="930" y1="752" x2="930" y2="700"/><line x1="1100" y1="752" x2="1100" y2="700"/><line x1="1250" y1="752" x2="1250" y2="700"/>
  </g>

  <!-- entry ramp + figure for scale -->
  <path d="M820 768 L905 712 L905 724 L840 768 Z" fill="#2a2622" fill-opacity="0.25"/>
  <g fill="#2a2622" fill-opacity="0.7">
    <circle cx="880" cy="734" r="6"/><rect x="876" y="740" width="8" height="20" rx="3"/>
  </g>

  <!-- cantilevered building: sectioned floor slabs (wood + amber glass) -->
  <rect x="1040" y="250" width="34" height="450" fill="#2a2622" fill-opacity="0.9"/>
  <g>
    <!-- L1 (lifted on pilotis) -->
    <rect x="900" y="610" width="380" height="90" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
    <rect x="900" y="602" width="380" height="10" fill="#c98a3c"/>
    <g stroke="#2a2622" stroke-opacity="0.35"><line x1="970" y1="610" x2="970" y2="700"/><line x1="1100" y1="610" x2="1100" y2="700"/><line x1="1210" y1="610" x2="1210" y2="700"/></g>
    <!-- L2 cantilever left -->
    <rect x="840" y="510" width="380" height="86" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
    <rect x="840" y="502" width="380" height="10" fill="#c98a3c"/>
    <g stroke="#2a2622" stroke-opacity="0.35"><line x1="910" y1="510" x2="910" y2="596"/><line x1="1040" y1="510" x2="1040" y2="596"/><line x1="1160" y1="510" x2="1160" y2="596"/></g>
    <!-- L3 cantilever right -->
    <rect x="980" y="410" width="380" height="86" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
    <rect x="980" y="402" width="380" height="10" fill="#c98a3c"/>
    <g stroke="#2a2622" stroke-opacity="0.35"><line x1="1050" y1="410" x2="1050" y2="496"/><line x1="1180" y1="410" x2="1180" y2="496"/><line x1="1300" y1="410" x2="1300" y2="496"/></g>
    <!-- L4 cantilever left -->
    <rect x="900" y="312" width="340" height="84" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
    <rect x="900" y="304" width="340" height="10" fill="#c98a3c"/>
    <g stroke="#2a2622" stroke-opacity="0.35"><line x1="970" y1="312" x2="970" y2="396"/><line x1="1090" y1="312" x2="1090" y2="396"/><line x1="1180" y1="312" x2="1180" y2="396"/></g>
    <!-- L5 roof + garden -->
    <rect x="960" y="220" width="300" height="84" fill="url(#glass)" stroke="#2a2622" stroke-width="2"/>
    <rect x="960" y="210" width="300" height="12" fill="#b4602a"/>
    <g stroke="#2a2622" stroke-opacity="0.35"><line x1="1030" y1="220" x2="1030" y2="304"/><line x1="1140" y1="220" x2="1140" y2="304"/><line x1="1200" y1="220" x2="1200" y2="304"/></g>
    <!-- roof garden -->
    <g fill="#6f7d4a" fill-opacity="0.8"><circle cx="1000" cy="206" r="12"/><circle cx="1035" cy="202" r="14"/><circle cx="1075" cy="206" r="11"/></g>
  </g>
</svg>
