<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Industrial — sawtooth warehouse">
  <rect width="800" height="500" fill="#e7e1d4"/>
  <rect x="0" y="380" width="800" height="120" fill="#d6cdbb"/>
  <rect x="120" y="240" width="560" height="140" fill="#1A1A1A"/>
  <!-- sawtooth roof -->
  <g fill="#26241f">
    <polygon points="120,240 200,180 200,240"/><polygon points="240,240 320,180 320,240"/>
    <polygon points="360,240 440,180 440,240"/><polygon points="480,240 560,180 560,240"/>
    <polygon points="600,240 680,180 680,240"/>
  </g>
  <g fill="#C9B27E" fill-opacity="0.6">
    <polygon points="160,238 200,208 200,238"/><polygon points="280,238 320,208 320,238"/>
    <polygon points="400,238 440,208 440,238"/><polygon points="520,238 560,208 560,238"/>
  </g>
  <rect x="360" y="300" width="90" height="80" fill="#C9B27E"/>
</svg>
