<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ETR mark">
  <defs>
    <linearGradient id="etrArch" x1="22" y1="18" x2="82" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0c789"/>
      <stop offset=".5" stop-color="#c98a3c"/>
      <stop offset="1" stop-color="#a8472a"/>
    </linearGradient>
  </defs>
  <!-- ground line -->
  <line x1="18" y1="85" x2="82" y2="85" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <!-- outer arch (warm gradient) -->
  <path d="M26 85 V46 a24 24 0 0 1 48 0 V85" fill="none" stroke="url(#etrArch)" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- inner doorway arch -->
  <path d="M40 85 V51 a10 10 0 0 1 20 0 V85" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- keystone accent -->
  <circle cx="50" cy="17" r="3.6" fill="#a8472a"/>
</svg>
