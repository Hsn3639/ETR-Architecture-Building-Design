<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ETR mark">
  <defs>
    <linearGradient id="etrGold" x1="30" y1="18" x2="72" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7cd82"/>
      <stop offset=".5" stop-color="#c79a3e"/>
      <stop offset="1" stop-color="#9c7426"/>
    </linearGradient>
  </defs>
  <!-- "e" ring, open to the right -->
  <path d="M66 30 A30 30 0 1 0 66 74" fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  <!-- "e" bar -->
  <line x1="40" y1="52" x2="67" y2="52" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  <!-- drafting compass legs -->
  <line x1="52" y1="25" x2="34" y2="86" stroke="url(#etrGold)" stroke-width="5.4" stroke-linecap="round"/>
  <line x1="52" y1="25" x2="68" y2="86" stroke="url(#etrGold)" stroke-width="5.4" stroke-linecap="round"/>
  <!-- compass hinge -->
  <circle cx="52" cy="24" r="4.6" fill="url(#etrGold)"/>
  <!-- bright centre pivot -->
  <circle cx="49" cy="52" r="3.4" fill="#ecd596"/>
</svg>
