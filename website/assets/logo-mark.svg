<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ETR mark">
  <!-- architectural plan square -->
  <rect x="16" y="16" width="68" height="68" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- poché quadrant (sand) -->
  <rect x="50" y="50" width="34" height="34" fill="#C9B27E" fill-opacity="0.20"/>
  <!-- quartering -->
  <line x1="50" y1="16" x2="50" y2="84" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="16" y1="50" x2="84" y2="50" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- centre node (keystone) -->
  <rect x="44" y="44" width="12" height="12" fill="#C9B27E"/>
</svg>
